<!DOCTYPE html>
<html>
<head>
<title>Mojo Connect Login</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:3000 http://localhost:5050; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data:;">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("images/flower.jpg") no-repeat center center;
  background-size:100% auto;
  background-color:#120f18;
  padding:24px;
  -webkit-text-size-adjust:100%;
}

.auth-wrap{
  width:100%;
  max-width:920px;
  text-align:center;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.brand{
  width:100%;
  margin-bottom:14px;
  display:flex;
  justify-content:center;
  isolation:isolate;
}

.brand-logo{
  width:min(92vw, 760px);
  max-height:260px;
  object-fit:contain;
  display:block;
  margin:0 auto;
  mix-blend-mode:normal;
  opacity:1;
  filter:drop-shadow(0 6px 14px rgba(0,0,0,0.12));
}

.login-box{
  width:100%;
  max-width:430px;
  margin:0 auto;
  border-radius:16px;
  background:rgba(255,255,255,0.13);
  backdrop-filter:blur(6px);
  border:2px solid rgba(255,255,255,0.45);
  color:white;
  text-align:center;
  padding:24px 22px 20px;
  box-shadow:0 10px 28px rgba(0,0,0,0.28);
}

.form-title{
  display:block;
  color:#fff;
  font-size:48px;
  font-weight:700;
  margin:0 auto 18px;
  background:none;
  min-width:0;
  padding:0;
  border-radius:0;
}

.input-group{
  position:relative;
  margin-bottom:14px;
}

.input-group input{
  width:100%;
  padding:11px 50px 11px 16px;
  border-radius:32px;
  border:1.8px solid rgba(255,255,255,0.58);
  background:transparent;
  color:white;
  outline:none;
  font-size:15px;
}

.input-group input::placeholder{
  color:rgba(255,255,255,0.86);
}

.input-group i{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  color:white;
}

.options{
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:13px;
  margin:8px 0 14px;
}

.options label{
  display:flex;
  align-items:center;
  gap:7px;
}

.options a{
  color:white;
  text-decoration:none;
}

.show-pass{
  display:flex;
  align-items:center;
  gap:7px;
  justify-content:flex-start;
  font-size:13px;
  margin:-4px 0 12px;
}

.login-btn{
  width:100%;
  padding:11px;
  border:none;
  border-radius:30px;
  background:white;
  color:#111;
  font-weight:700;
  font-size:16px;
  cursor:pointer;
}

.login-btn:hover{
  background:#f3f4f6;
}

.register{
  margin-top:14px;
  font-size:14px;
}

.register a{
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#errorMsg, #registerMsg{
  margin-top:10px;
  font-size:14px;
  min-height:18px;
  color:#ffd7d7;
}

#registerForm{
  display:none;
}

@media (max-width: 640px){
  body{
    background-size:cover;
    background-position:center center;
  }
  .brand-logo{
    width:min(92vw, 520px);
    max-height:190px;
  }
  .form-title{
    font-size:40px;
  }
}

</style>

</head>

<body>

<div class="auth-wrap">

<div class="brand">
  <img src="images/mojo-logo.jpeg" alt="Mojo Connect" class="brand-logo">
</div>

<div class="login-box">

<!-- LOGIN FORM -->
<form id="loginForm">

<h2 class="form-title">Login</h2>

<div class="input-group">
<input type="email" id="email" placeholder="Username / Email" required autocomplete="email">
<i class="fa fa-user"></i>
</div>

<div class="input-group">
<input type="password" id="password" placeholder="Password" required autocomplete="current-password">
<i class="fa fa-lock"></i>
</div>

<label class="show-pass">
  <input type="checkbox" id="showLoginPassword"> Show password
</label>

<div class="options">
<label>
<input type="checkbox"> Remember me
</label>

<a href="#">Forgot password?</a>
</div>

<button type="submit" class="login-btn">Login</button>

<p id="errorMsg"></p>

<div class="register">
Don't have an account? <a id="showRegisterLink">Register</a>
</div>

</form>

<!-- REGISTER FORM -->
<form id="registerForm">

<h2 class="form-title">Register</h2>

<div class="input-group">
<input type="text" id="regName" placeholder="Full Name" required autocomplete="name">
<i class="fa fa-user"></i>
</div>

<div class="input-group">
<input type="email" id="regEmail" placeholder="Email" required autocomplete="email">
<i class="fa fa-envelope"></i>
</div>

<div class="input-group">
<input type="password" id="regPassword" placeholder="Password" required autocomplete="new-password">
<i class="fa fa-lock"></i>
</div>

<label class="show-pass">
  <input type="checkbox" id="showRegisterPassword"> Show password
</label>

<button type="submit" class="login-btn">Register</button>

<p id="registerMsg"></p>

<div class="register">
Already have an account? <a id="showLoginLink">Login</a>
</div>

</form>

</div>
</div>

<script src="login.js"></script>

</body>
</html>
