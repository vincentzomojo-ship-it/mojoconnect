<!DOCTYPE html>
<html>
<head>
<title>Buy MTN Data</title>

<style>

body{
font-family:Arial;
background:#f4f6f9;
padding:40px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
max-width:500px;
margin:auto;
box-shadow:0 4px 10px rgba(0,0,0,0.05);
}

input,select{
width:100%;
padding:10px;
margin-top:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:12px;
background:#4CAF50;
border:none;
color:white;
border-radius:6px;
margin-top:15px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="card">

<h2>📶 Buy MTN Data</h2>

<input id="phone" placeholder="Enter phone number">

<select id="bundle">

<option value="">Select bundle</option>
<option value="1GB">1GB - GH₵5</option>
<option value="2GB">2GB - GH₵9</option>
<option value="5GB">5GB - GH₵20</option>
<option value="10GB">10GB - GH₵35</option>

</select>

<button onclick="buyData()">Buy Data</button>

<p id="message"></p>

</div>

<script src="mtn.js"></script>

</body>
</html>
