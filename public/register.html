<!DOCTYPE html>
<html>
<head>
<title>Mojo Connect Register</title>

<meta http-equiv="Content-Security-Policy" content="default-src 'self'; connect-src 'self' http://localhost:3000 http://localhost:5050; script-src 'self' https://cdnjs.cloudflare.com; style-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com; font-src 'self' data: https://cdnjs.cloudflare.com https://fonts.gstatic.com; img-src 'self' data:;">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:url("images/flower.jpg") no-repeat center center;
  background-size:cover;
  padding:24px;
}

.auth-wrap{
  width:100%;
  max-width:520px;
  text-align:center;
}

.brand{
  margin-bottom:18px;
  color:white;
  text-shadow:0 8px 18px rgba(0,0,0,0.42);
}

.brand-row{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.brand-icon{
  width:72px;
  height:72px;
  border-radius:50%;
  display:grid;
  place-items:center;
  font-size:34px;
  color:#0ea5e9;
  background:radial-gradient(circle at 35% 30%, #f59e0b 8%, #111827 68%);
  border:2px solid rgba(255,255,255,0.5);
}

.brand-title{
  font-size:66px;
  font-weight:800;
  letter-spacing:2px;
  line-height:0.88;
}

.brand-sub{
  margin-top:4px;
  color:#ffb347;
  font-size:44px;
  font-weight:700;
  letter-spacing:4px;
}

.login-box{
  width:100%;
  max-width:500px;
  margin:0 auto;
  border-radius:18px;
  background:rgba(54, 28, 22, 0.5);
  backdrop-filter:blur(8px);
  border:3px solid rgba(255,255,255,0.66);
  color:white;
  text-align:center;
  padding:22px 26px 24px;
  box-shadow:0 14px 42px rgba(0,0,0,0.34);
}

.form-title{
  display:inline-block;
  min-width:200px;
  padding:8px 22px;
  border-radius:0 0 22px 22px;
  background:white;
  color:#111;
  font-size:40px;
  font-weight:500;
  margin:-22px auto 22px;
}

.input-group{
  position:relative;
  margin-bottom:14px;
}

.input-group input{
  width:100%;
  padding:12px 50px 12px 18px;
  border-radius:32px;
  border:2px solid rgba(255,255,255,0.86);
  background:transparent;
  color:white;
  outline:none;
  font-size:16px;
}

.input-group input::placeholder{
  color:rgba(255,255,255,0.86);
}

.input-group i{
  position:absolute;
  right:18px;
  top:50%;
  transform:translateY(-50%);
  color:white;
}

.login-btn{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:white;
  color:#111;
  font-weight:700;
  font-size:18px;
  cursor:pointer;
}

.login-btn:hover{
  background:#f3f4f6;
}

.register{
  margin-top:16px;
  font-size:14px;
}

.register a{
  color:#fff;
  font-weight:700;
  cursor:pointer;
}

#registerMsg{
  margin-top:10px;
  font-size:14px;
  min-height:18px;
  color:#ffd7d7;
}

@media (max-width: 640px){
  .brand-title{
    font-size:46px;
  }
  .brand-sub{
    font-size:30px;
  }
  .brand-icon{
    width:56px;
    height:56px;
    font-size:26px;
  }
  .form-title{
    font-size:30px;
    min-width:150px;
  }
}

</style>

</head>

<body>

<div class="auth-wrap">

<div class="brand">
  <div class="brand-row">
    <div class="brand-icon"><i class="fa-solid fa-globe"></i></div>
    <div class="brand-title">MOJO</div>
  </div>
  <div class="brand-sub">CONNECT</div>
</div>

<div class="login-box">

<form id="registerForm">

<h2 class="form-title">Register</h2>

<div class="input-group">
<input type="text" id="regName" placeholder="Full Name" required autocomplete="name">
<i class="fa fa-user"></i>
</div>

<div class="input-group">
<input type="email" id="regEmail" placeholder="Email" required autocomplete="email">
<i class="fa fa-envelope"></i>
</div>

<div class="input-group">
<input type="password" id="regPassword" placeholder="Password" required autocomplete="new-password">
<i class="fa fa-lock"></i>
</div>

<button type="submit" class="login-btn">Register</button>

<p id="registerMsg"></p>

<div class="register">
Already have an account? <a href="/login.html">Login</a>
</div>

</form>

</div>
</div>

<script src="login.js"></script>

</body>
</html>
