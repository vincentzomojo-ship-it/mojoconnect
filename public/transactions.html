<!DOCTYPE html>
<html>
<head>
<title>Transactions</title>
<style>
body {
  font-family: Arial;
  background: #f4f6f8;
}

.container {
  width: 90%;
  margin: auto;
  margin-top: 40px;
}

table {
  width: 100%;
  border-collapse: collapse;
  background: white;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #ddd;
  text-align: left;
}

th {
  background: #222;
  color: white;
}

.credit {
  color: green;
  font-weight: bold;
}

.debit {
  color: red;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="container">

<h2>Transaction History</h2>

<table id="txTable">
<thead>
<tr>
<th>Date</th>
<th>Type</th>
<th>Amount</th>
<th>Status</th>
<th>Description</th>
<th>Reference</th>
</tr>
</thead>

<tbody></tbody>

</table>

</div>

<script src="transactions.js"></script>

</body>
</html>
