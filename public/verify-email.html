<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email - Mojo Connect</title>
  <style>
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:Arial, Helvetica, sans-serif;
      background:linear-gradient(135deg,#f4f6f9,#e8ecf3);
      padding:20px;
    }
    .card{
      width:min(92vw,520px);
      background:#fff;
      border-radius:14px;
      padding:24px;
      box-shadow:0 12px 28px rgba(0,0,0,0.12);
    }
    h1{
      margin:0 0 12px;
      font-size:28px;
    }
    p{
      margin:0 0 14px;
      color:#4b5563;
      line-height:1.5;
    }
    .ok{ color:#15803d; font-weight:700; }
    .err{ color:#b91c1c; font-weight:700; }
    a{
      display:inline-block;
      margin-top:10px;
      color:#fff;
      background:#f6b700;
      text-decoration:none;
      padding:10px 14px;
      border-radius:10px;
      font-weight:700;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Email Verification</h1>
    <p id="statusText">Verifying your email, please wait...</p>
    <a href="/login.html">Go to Login</a>
  </div>

  <script>
    (async function(){
      const statusText = document.getElementById("statusText");
      const token = new URLSearchParams(window.location.search).get("token");
      if(!token){
        statusText.textContent = "Verification token is missing.";
        statusText.className = "err";
        return;
      }

      try{
        const res = await fetch(`/auth/verify-email?token=${encodeURIComponent(token)}`);
        const data = await res.json().catch(() => ({}));
        if(res.ok){
          statusText.textContent = data.message || "Email verified successfully.";
          statusText.className = "ok";
          return;
        }
        statusText.textContent = data.message || "Unable to verify email.";
        statusText.className = "err";
      }catch{
        statusText.textContent = "Server error while verifying email.";
        statusText.className = "err";
      }
    })();
  </script>
</body>
</html>
